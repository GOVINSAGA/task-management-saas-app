version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: taskmanager-db
    environment:
      POSTGRES_DB: taskmanager_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: taskmanager_dev_2024
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - taskmanager-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    container_name: taskmanager-api
    ports:
      - "5002:5002"
    environment:
      NODE_ENV: development
      PORT: 5002
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: taskmanager_db
      DB_USER: postgres
      DB_PASSWORD: taskmanager_dev_2024
      JWT_SECRET: tm_jwt_secret_key_2024_super_secure_change_in_prod
      JWT_EXPIRE: 7d
      CLIENT_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    networks:
      - taskmanager-net
    restart: unless-stopped

volumes:
  pgdata:

networks:
  taskmanager-net:
    driver: bridge
