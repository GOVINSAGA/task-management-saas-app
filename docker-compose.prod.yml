version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: taskmanager-db-prod
    environment:
      POSTGRES_DB: taskmanager_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    networks:
      - taskmanager-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  api:
    image: ghcr.io/${GITHUB_REPO:-user/task-api}:latest
    container_name: taskmanager-api-prod
    ports:
      - "5002:5002"
    environment:
      NODE_ENV: production
      PORT: 5002
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: taskmanager_db
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production}
      JWT_EXPIRE: 7d
      CLIENT_URL: https://taskManagement.govinsaga.pp.ua
    depends_on:
      db:
        condition: service_healthy
    networks:
      - taskmanager-net
    restart: always

volumes:
  pgdata-prod:

networks:
  taskmanager-net:
    driver: bridge
